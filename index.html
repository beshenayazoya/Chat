<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каменный Чат</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #b3e5fc; display: flex; justify-content: center; align-items: center; hheight: 100vh; padding: 10px; }
        
        .chat-container { display: flex; width: 100%; max-width: 800px; height: 90vh; background: #fff; border: 4px solid #424242; border-radius: 12px; overflow: hidden; }
        
        /* Левая часть: чат */
        .main-chat { flex: 3; display: flex; flex-direction: column; border-right: 2px solid #424242; }
        
        /* Шапка */
        .chat-header { background: #424242; color: #fff; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .status { font-size: 12px; padding: 4px 8px; border-radius: 4px; background: red; }
        .status.online { background: #4caf50; }
        
        /* Вкладки */
        .tabs { display: flex; background: #f5f5f5; border-bottom: 2px solid #424242; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-weight: bold; background: #eee; }
        .tab.active { background: #fff; border-bottom: 3px solid #2196f3; color: #2196f3; }

        /* Профиль сверху */
        .profile-panel { padding: 8px; background: #e0e0e0; display: flex; gap: 5px; }
        .profile-panel input { padding: 6px; border: 2px solid #424242; border-radius: 4px; flex: 1; }

        /* Окно сообщений */
        .messages-box { flex: 1; padding: 10px; overflow-y: auto; background: #fafafa; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; width: fit-content; }
        .msg.global-msg { background: #e1f5fe; align-self: flex-start; border: 2px solid #03a9f4; }
        .msg.private-msg { background: #f3e5f5; align-self: flex-start; border: 2px solid #9c27b0; font-style: italic; }
        .msg.my-msg { align-self: flex-end; background: #e8f5e9; border: 2px solid #4caf50; }
        .msg .author { font-weight: bold; display: block; font-size: 12px; margin-bottom: 4px; color: #333; }

        /* Поле ввода */
        .input-panel { display: flex; padding: 10px; background: #eee; border-top: 2px solid #424242; }
        .input-panel input { flex: 1; padding: 10px; border: 2px solid #424242; border-radius: 4px; outline: none; }
        .input-panel button { padding: 10px 15px; margin-left: 5px; background: #424242; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* Правая часть: список игроков */
        .users-sidebar { flex: 1; background: #eceff1; display: flex; flex-direction: column; padding: 10px; }
        .sidebar-title { font-weight: bold; margin-bottom: 10px; color: #37474f; font-size: 14px; text-align: center; }
        .user-item { padding: 8px; background: #fff; border: 2px solid #cfd8dc; border-radius: 6px; margin-bottom: 5px; cursor: pointer; text-align: center; font-size: 13px; transition: 0.2s; }
        .user-item:hover { background: #b3e5fc; border-color: #03a9f4; }
        .user-item.selected { background: #e1f5fe; border-color: #03a9f4; font-weight: bold; }
    </style>
</head>
<body>

<div class="chat-container">
    <!-- Основной чат -->
    <div class="main-chat">
        <div class="chat-header">
            <span>🪨 Каменная Сеть</span>
            <span id="status" class="status">Подключение...</span>
        </div>

        <div class="profile-panel">
            <input type="text" id="nicknameInput" placeholder="Твой ник (например, Могучий Валун)" value="Камень">
            <button id="saveProfileBtn" style="padding: 5px 10px; background: #4caf50; color: white; border: none; border-radius: 4px; cursor: pointer;">ОК</button>
        </div>

        <div class="tabs">
            <div id="tabGlobal" class="tab active">Глобальный чат</div>
            <div id="tabPrivate" class="tab">Личные сообщения (ЛС)</div>
        </div>

        <div id="messagesBox" class="messages-box"></div>

        <div class="input-panel">
            <input type="text" id="chatInput" placeholder="Напишите сообщение камням...">
            <button id="sendBtn">Отправить</button>
        </div>
    </div>

    <!-- Список игроков справа -->
    <div class="users-sidebar">
        <div class="sidebar-title">Камни в сети</div>
        <div id="usersList"></div>
    </div>
</div>

<script>
    // === НАСТРОЙКА АДРЕСА (ВСТАВЬ СВОЙ АДРЕС С RENDER ТУТ) ===
    const SERVER_URL = 'wss://chat-uqlc.onrender.com';

    const messagesBox = document.getElementById('messagesBox');
    const chatInput = document.getElementById('chatInput');
    const nicknameInput = document.getElementById('nicknameInput');
    const saveProfileBtn = document.getElementById('saveProfileBtn');
    const sendBtn = document.getElementById('sendBtn');
    const statusEl = document.getElementById('status');
    const usersListEl = document.getElementById('usersList');
    
    const tabGlobal = document.getElementById('tabGlobal');
    const tabPrivate = document.getElementById('tabPrivate');

    let socket;
    let myId = null;
    let currentTab = 'global'; // 'global' или 'private'
    let selectedTargetId = null; // ID игрока, с которым открыто ЛС
    let selectedTargetName = '';

    // База данных сообщений (чтобы не пропадали при переключении вкладок)
    let globalMessages = [];
    let privateMessages = []; // { fromId, targetId, username, text, isMy }

    // Подключение к вебсокету
    function connect() {
        socket = new WebSocket(SERVER_URL);

        socket.onopen = () => {
            statusEl.textContent = 'В сети';
            statusEl.classList.add('online');
            sendProfile();
        };

        socket.onclose = () => {
            statusEl.textContent = 'Офлайн';
            statusEl.classList.remove('online');
            setTimeout(connect, 3000); // автореконнект если упал
        };

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);

            // Регистрация нашего ID сервером
            if (data.type === 'init') {
                myId = data.yourId;
            }

            // Обновление списка людей справа
            if (data.type === 'user_list') {
                renderUserList(data.users);
            }

            // Пришло глобальное сообщение
            if (data.type === 'global') {
                globalMessages.push(data);
                if (currentTab === 'global') {
                    displayMessage(data.username, data.text, data.fromId === myId, false);
                }
            }

            // Пришло личное сообщение (ЛС)
            if (data.type === 'private') {
                const isMy = (data.fromId === myId);
                privateMessages.push({ ...data, isMy });
                
                // Если сейчас открыта вкладка ЛС именно с этим человеком (или мы сами ему отправили)
                if (currentTab === 'private') {
                    if ((isMy && data.targetId === selectedTargetId) || (!isMy && data.fromId === selectedTargetId)) {
                        displayMessage(data.username, data.text, isMy, true);
                    }
                } else {
                    // Если вкладка закрыта, подсветим кнопку ЛС
                    tabPrivate.textContent = 'ЛС (Новое сообщение!)';
                    tabPrivate.style.color = '#9c27b0';
                }
            }
        };
    }

    // Отправка профиля на сервер
    function sendProfile() {
        if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({
                type: 'set_profile',
                username: nicknameInput.value.trim() || 'Аноним'
            }));
        }
    }

    // Рендер списка онлайн-игроков
    function renderUserList(users) {
        usersListEl.innerHTML = '';
        users.forEach(u => {
            if (u.id === myId) return; // Себя в списке не показываем

            const div = document.createElement('div');
            div.className = 'user-item';
            if (u.id === selectedTargetId) div.classList.add('selected');
            div.textContent = u.username;
            
            // Клик по игроку открывает ЛС с ним
            div.onclick = () => {
                selectedTargetId = u.id;
                selectedTargetName = u.username;
                switchTab('private');
            };
            usersListEl.appendChild(div);
        });
    }

    // Переключение вкладок (Глобал / ЛС)
    function switchTab(tab) {
        currentTab = tab;
        messagesBox.innerHTML = '';
        
        if (tab === 'global') {
            tabGlobal.classList.add('active');
            tabPrivate.classList.remove('active');
            chatInput.placeholder = "Напишите сообщение камням...";
            
            // Восстанавливаем историю глобала
            globalMessages.forEach(m => {
                displayMessage(m.username, m.text, m.fromId === myId, false);
            });
        } else {
            tabGlobal.classList.remove('active');
            tabPrivate.classList.add('active');
            tabPrivate.textContent = 'Личные сообщения (ЛС)';
            tabPrivate.style.color = '';

            if (!selectedTargetId) {
                messagesBox.innerHTML = '<div style="text-align:center; color:#999; margin-top:20px;">Выбери камень из списка справа, чтобы нашептать ЛС</div>';
                chatInput.placeholder = "Кому пишем? Выберите справа...";
                return;
            }

            chatInput.placeholder = `Личное сообщение для ${selectedTargetName}...`;

            // Фильтруем и восстанавливаем историю ЛС только с выбранным игроком
            privateMessages.forEach(m => {
                if ((m.isMy && m.targetId === selectedTargetId) || (!m.isMy && m.fromId === selectedTargetId)) {
                    displayMessage(m.username, m.text, m.isMy, true);
                }
            });
        }
    }

    // Вывод сообщения на экран
    function displayMessage(username, text, isMy, isPrivate) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('msg');
        
        if (isMy) msgDiv.classList.add('my-msg');
        else if (isPrivate) msgDiv.classList.add('private-msg');
        else msgDiv.classList.add('global-msg');

        const authorSpan = document.createElement('span');
        authorSpan.className = 'author';
        authorSpan.textContent = isPrivate ? `[ЛС] ${username}` : username;

        const textNode = document.createTextNode(text);

        msgDiv.appendChild(authorSpan);
        msgDiv.appendChild(textNode);
        messagesBox.appendChild(msgDiv);
        messagesBox.scrollTop = messagesBox.scrollHeight;
    }

    // Отправка сообщений
    function sendMessage() {
        const text = chatInput.value.trim();
        if (!text) return;

        if (currentTab === 'global') {
            socket.send(JSON.stringify({ type: 'global', text: text }));
        } else {
            if (!selectedTargetId) {
                alert('Сначала выбери кому писать из списка справа!');
                return;
            }
            socket.send(JSON.stringify({ type: 'private', targetId: selectedTargetId, text: text }));
        }
        chatInput.value = '';
    }

    // Слушатели событий
    tabGlobal.onclick = () => switchTab('global');
    tabPrivate.onclick = () => switchTab('private');
    saveProfileBtn.onclick = sendProfile;
    sendBtn.onclick = sendMessage;
    chatInput.onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };

    // Поехали!
    connect();
</script>

</body>
</html>
